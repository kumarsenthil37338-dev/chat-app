<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Campus Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel">
            <div class="brand-block">
                <span class="brand-mark">CC</span>
                <div>
                    <h1>Campus Chat</h1>
                    <p>Sign in to continue your real-time conversation.</p>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-stack">
                        {% for category, message in messages %}
                            <div class="flash flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="auth-form">
                <label for="identity">Username or Email</label>
                <input id="identity" name="identity" type="text" autocomplete="username" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <button type="submit" class="primary-button">Log In</button>
            </form>

            <p class="auth-switch">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
        </section>
    </main>
</body>
</html>
