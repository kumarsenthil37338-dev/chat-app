<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Campus Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel wide">
            <div class="brand-block">
                <span class="brand-mark">CC</span>
                <div>
                    <h1>Create Account</h1>
                    <p>Join the shared chat room with your own profile.</p>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-stack">
                        {% for category, message in messages %}
                            <div class="flash flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" enctype="multipart/form-data" class="auth-form grid-form">
                <div>
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" minlength="3" maxlength="30" required>
                </div>

                <div>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required>
                </div>

                <div>
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" minlength="6" required>
                </div>

                <div>
                    <label for="confirm_password">Confirm Password</label>
                    <input id="confirm_password" name="confirm_password" type="password" minlength="6" required>
                </div>

                <div class="full-span">
                    <label for="profile_picture">Profile Picture</label>
                    <input id="profile_picture" name="profile_picture" type="file" accept="image/*">
                </div>

                <button type="submit" class="primary-button full-span">Register</button>
            </form>

            <p class="auth-switch">Already registered? <a href="{{ url_for('login') }}">Log in</a></p>
        </section>
    </main>
</body>
</html>
